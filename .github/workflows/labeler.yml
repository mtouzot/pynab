name: 🏷️ Pull Request Labeler
on:
  - pull_request_target

permissions:
  contents: read
  pull-requests: write

jobs:
  pr_triage:
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels
        uses: actions/labeler@v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labels.yml
          sync-labels: true
